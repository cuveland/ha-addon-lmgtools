name: "LMG95 Power Logger"
description: "Log ZES Zimmer LMG95 power measurements to InfluxDB and/or MQTT"
version: "1.0.0"
slug: "lmgtools"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
options:
  host: ""
  port: 2101
  interval: 0.5
  lowpass: false
  logfile: ""
  influxdb_enabled: false
  influxdb_host: "localhost"
  influxdb_port: 8086
  influxdb_database: "powerlog"
  mqtt_enabled: false
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_topic: "lmgtools"
schema:
  host: str
  port: int
  interval: float
  lowpass: bool
  logfile: str
  influxdb_enabled: bool
  influxdb_host: str
  influxdb_port: int
  influxdb_database: str
  mqtt_enabled: bool
  mqtt_host: str
  mqtt_port: int
  mqtt_topic: str
