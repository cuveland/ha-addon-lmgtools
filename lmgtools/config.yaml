name: "LMG95 Power Logger"
description: "Log ZES Zimmer LMG95 power measurements to InfluxDB and/or MQTT"
version: "1.0.0"
slug: "lmgtools"
url: "https://github.com/cuveland/ha-addon-lmgtools"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
options:
  port: 2101
  interval: 1.0
  lowpass: false
  logfile: ""
  influxdb:
    enabled: false
    host: "localhost"
    port: 8086
    database: "powerlog"
  mqtt:
    enabled: false
    host: "core-mosquitto"
    port: 1883
    topic: "lmgtools"
schema:
  host: str
  port: port
  interval: float(0.05,)
  lowpass: bool
  logfile: str?
  influxdb:
    enabled: bool
    host: str
    port: port
    database: str
  mqtt:
    enabled: bool
    host: str
    port: port
    topic: str
