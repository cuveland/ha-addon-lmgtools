configuration:
  host:
    name: Device host
    description: >-
      Hostname or IP address of the RS232-Ethernet converter connected to the
      LMG95.
  port:
    name: Device port
    description: TCP port of the RS232-Ethernet converter (raw TCP, usually 2101).
  interval:
    name: Measurement interval
    description: >-
      Time between measurements in seconds. The LMG95 rounds this to a whole
      number of signal periods.
  lowpass:
    name: 60 Hz low-pass filter
    description: >-
      Enable the built-in low-pass filter, useful for suppressing
      high-frequency noise on the measured signal.
  logfile:
    name: Log file
    description: >-
      Optional path to a file inside the add-on container where raw
      measurements are written. Leave empty to disable file logging.
  influxdb:
    name: InfluxDB
    description: >-
      Write measurements to an InfluxDB 1.x database. Enable it and set the
      server host, port, and database name. The database is created
      automatically if it does not exist. For the Community Add-ons InfluxDB
      add-on use host a0d7b954-influxdb and set the username and password of a
      user with write access (leave both empty if authentication is disabled).
  mqtt:
    name: MQTT
    description: >-
      Publish measurements via MQTT, including Home Assistant MQTT discovery so
      sensors appear automatically. Enable it and set the broker host, port, and
      base topic. Use core-mosquitto for the official Mosquitto add-on; state is
      published to <topic>/state.
